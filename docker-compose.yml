version: '3.8'

services:
  backend:
    build: 
      context: ./backend
    container_name: his_rag_backend
    restart: unless-stopped
    ports:
      - "8012:8012"
    volumes:
      # 将宿主机的 data 目录挂载到容器的根目录下的 /data
      # 因为 Python 代码中计算路径为: Path(__file__).resolve().parents[3] / "data"
      # __file__ 在容器内是 /app/app/api/knowledge.py，向上推3级刚好是 /
      - ./data:/data
    environment:
      - TZ=Asia/Shanghai
      
  frontend:
    build:
      context: ./frontend
    container_name: his_rag_frontend
    restart: unless-stopped
    ports:
      # 将宿主机的 80 端口映射到容器内的 80 (Nginx)
      - "80:80"
    depends_on:
      - backend
    environment:
      - TZ=Asia/Shanghai
